name: Overhaul Governance CI

on:
  pull_request:
    branches:
      - main

jobs:
  governance-smoke:
    name: Governance Smoke Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify governance docs exist
        run: |
          test -f MIGRATION_CHECKLIST.md || { echo "Missing MIGRATION_CHECKLIST.md"; exit 1; }
          test -f OVERHAUL_ROADMAP.md || { echo "Missing OVERHAUL_ROADMAP.md"; exit 1; }
          test -f OVERHAUL_STATUS.md || { echo "Missing OVERHAUL_STATUS.md"; exit 1; }
          test -f CONTRIBUTING.md || { echo "Missing CONTRIBUTING.md"; exit 1; }
          test -f .github/workflows/steam-version-selection-static-audit.yml || { echo "Missing Steam version-selection static audit workflow"; exit 1; }
          test -f scripts/audit-steam-version-selection.ps1 || { echo "Missing Steam version-selection static audit helper"; exit 1; }
          test -f scripts/audit-steam-branch-guidance-parity.ps1 || { echo "Missing Steam branch guidance parity helper"; exit 1; }
          test -f docs/steam-version-selection-validation.md || { echo "Missing Steam version-selection validation docs"; exit 1; }

      - name: Validate repository diff hygiene
        run: |
          git diff --check
          python - <<'PY'
          from pathlib import Path

          critical = [
              "MIGRATION_CHECKLIST.md",
              "OVERHAUL_ROADMAP.md",
              "OVERHAUL_STATUS.md",
              "CONTRIBUTING.md",
              ".github/workflows/steam-version-selection-static-audit.yml",
              "scripts/audit-steam-version-selection.ps1",
              "scripts/audit-steam-branch-guidance-parity.ps1",
              "docs/steam-version-selection-validation.md",
          ]

          for name in critical:
              path = Path(name)
              text = path.read_text(encoding="utf-8", errors="replace")
              if not text.strip():
                  raise SystemExit(f"{name} is unexpectedly empty")

          print("Governance smoke checks passed.")
          PY

  build-smoke:
    name: Build Smoke Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Check for project prerequisites
        id: prerequisites
        shell: bash
        run: |
          if [[ -f "upstream/godot-export/.godot/mono/publish/arm64/0Harmony.dll" \
              && -f "upstream/godot-export/.godot/mono/publish/arm64/GodotSharp.dll" \
              && -f "upstream/godot-export/.godot/mono/publish/arm64/sts2.dll" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run build smoke test
        if: steps.prerequisites.outputs.available == 'true'
        run: |
          set -o pipefail
          mkdir -p ci-smoke-artifacts
          if dotnet build src/STS2Mobile/STS2Mobile.csproj | tee ci-smoke-artifacts/build.log; then
            echo "BUILD_SMOKE=SUCCESS" > ci-smoke-artifacts/status.txt
          else
            echo "BUILD_SMOKE=FAILED" > ci-smoke-artifacts/status.txt
            exit 1
          fi
          echo "REPO_REF=${{ github.sha }}" >> ci-smoke-artifacts/status.txt

      - name: Skip build when publishing artifacts are unavailable
        if: steps.prerequisites.outputs.available != 'true'
        run: |
          echo '::notice::Build smoke skipped: required publish artifacts are not available in this checkout.'
          mkdir -p ci-smoke-artifacts
          echo "BUILD_SMOKE=SKIPPED" > ci-smoke-artifacts/status.txt
          echo "REASON=missing_prerequisites" >> ci-smoke-artifacts/status.txt

      - name: Upload build smoke coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-smoke-coverage-${{ github.run_id }}
          path: ci-smoke-artifacts
          if-no-files-found: warn
          retention-days: 14
