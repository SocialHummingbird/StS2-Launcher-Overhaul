name: Android Release

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Android applicationId for generated APK."
        required: false
        default: "com.sts2launcher.overhaul.fork.dev"
      release_tag:
        description: "Release tag to use (optional, e.g. v0.2.1)."
        required: false
        default: ""
      upstream_release_tag:
        description: "Upstream release tag to source GodotSharp.dll when local artifacts are missing."
        required: false
        default: "0.2.0"
      sts2_dll_source_url:
        description: "Optional URL to a raw sts2.dll when the upstream release APK does not include it."
        required: false
        default: ""
      patched_godot_apk_url:
        description: "Optional APK URL to source patched arm64 libgodot_android.so from."
        required: false
        default: "https://github.com/SocialHummingbird/StS2-Launcher-Overhaul/releases/download/v0.2.88-apk-native-verify/StS2Launcher-v0.2.88-universal-phone.apk"
      version_name:
        description: "Override APK version name (optional)."
        required: false
        default: ""
      version_code:
        description: "Override APK version code (optional)."
        required: false
        default: ""
      create_release:
        description: "Create or update a GitHub release."
        type: boolean
        required: false
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android-release:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      package_name: ${{ steps.version.outputs.package_name }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      apk_path: ${{ steps.build.outputs.path }}
      signed: ${{ steps.signing.outputs.enabled }}
      create_release: ${{ steps.version.outputs.create_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Resolve release metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
            CREATE_RELEASE="${{ github.event.inputs.create_release }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
            CREATE_RELEASE="true"
          fi

          if [[ -z "${RELEASE_TAG}" ]]; then
            RELEASE_TAG="nightly-${GITHUB_SHA:0:7}"
          fi

          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [[ -z "${VERSION_NAME}" ]]; then
            VERSION_NAME="${RELEASE_TAG#v}"
          fi

          PACKAGE_NAME="${{ github.event.inputs.package_name }}"
          if [[ -z "${PACKAGE_NAME}" ]]; then
            PACKAGE_NAME="com.sts2launcher.overhaul.fork"
          fi

          VERSION_CODE="${{ github.event.inputs.version_code }}"
          if [[ -z "${VERSION_CODE}" ]]; then
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi

          if ! [[ "${VERSION_CODE}" =~ ^[0-9]+$ ]] || (( VERSION_CODE < 1 )); then
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi
          if ! [[ "${VERSION_CODE}" =~ ^[0-9]+$ ]] || (( VERSION_CODE < 1 )); then
            VERSION_CODE="1"
          fi

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "create_release=$CREATE_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Check Android build prerequisites
        id: prerequisites
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_DIR="upstream/godot-export/.godot/mono/publish/arm64"
          mkdir -p "$PUBLISH_DIR"
          REQUIRED_DLLS=(
            "0Harmony.dll"
            "GodotSharp.dll"
            "sts2.dll"
          )
          MISSING_DLLS=()

          for dll in "${REQUIRED_DLLS[@]}"; do
            if [[ ! -f "$PUBLISH_DIR/$dll" ]]; then
              MISSING_DLLS+=("$dll")
            fi
          done

          if (( ${#MISSING_DLLS[@]} == 0 )); then
            echo "Found local publish dependencies in ${PUBLISH_DIR}; still staging upstream Mono Android runtime."
          else
            echo "::warning::Missing publish dependencies: ${MISSING_DLLS[*]}. Attempting to source from upstream release."
          fi

          UPSTREAM_TAG="${{ github.event.inputs.upstream_release_tag }}"
          if [[ -z "${UPSTREAM_TAG}" ]]; then
            UPSTREAM_TAG="0.2.0"
          fi
          UPSTREAM_APK="StS2Launcher-v${UPSTREAM_TAG}.apk"
          UPSTREAM_URL="https://github.com/Ekyso/StS2-Launcher/releases/download/${UPSTREAM_TAG}/${UPSTREAM_APK}"
          TMP_DIR="$(mktemp -d)"
          TMP_APK="$TMP_DIR/$UPSTREAM_APK"

          if command -v curl >/dev/null 2>&1; then
            curl -fsSL -o "$TMP_APK" "$UPSTREAM_URL"
          elif command -v wget >/dev/null 2>&1; then
            wget -qO "$TMP_APK" "$UPSTREAM_URL"
          else
            echo "::error::Neither curl nor wget available to fetch upstream APK fallback."
            exit 1
          fi

          if [[ ! -f "$TMP_APK" ]]; then
            echo "::error::Failed to download upstream APK from $UPSTREAM_URL"
            exit 1
          fi

          echo "Staging upstream Mono native runtime and base class libraries."
          mkdir -p android/libs/release/arm64-v8a android/assets/dotnet_bcl
          unzip -jo "$TMP_APK" 'lib/arm64-v8a/*.so' -d android/libs/release/arm64-v8a
          unzip -jo "$TMP_APK" 'assets/dotnet_bcl/*.dll' -d android/assets/dotnet_bcl

          PATCHED_GODOT_APK_URL="${{ github.event.inputs.patched_godot_apk_url }}"
          if [[ -z "${PATCHED_GODOT_APK_URL}" ]]; then
            PATCHED_GODOT_APK_URL="https://github.com/SocialHummingbird/StS2-Launcher-Overhaul/releases/download/v0.2.88-apk-native-verify/StS2Launcher-v0.2.88-universal-phone.apk"
          fi
          PATCHED_GODOT_APK="$TMP_DIR/patched-godot-source.apk"
          echo "Staging patched libgodot_android.so from ${PATCHED_GODOT_APK_URL}"
          if command -v curl >/dev/null 2>&1; then
            curl -fsSL -o "$PATCHED_GODOT_APK" "$PATCHED_GODOT_APK_URL"
          elif command -v wget >/dev/null 2>&1; then
            wget -qO "$PATCHED_GODOT_APK" "$PATCHED_GODOT_APK_URL"
          else
            echo "::error::Neither curl nor wget available to fetch patched Godot APK."
            exit 1
          fi
          if ! unzip -p "$PATCHED_GODOT_APK" 'lib/arm64-v8a/libgodot_android.so' > android/libs/release/arm64-v8a/libgodot_android.so; then
            echo "::error::Patched Godot APK does not contain lib/arm64-v8a/libgodot_android.so."
            exit 1
          fi

          STS2_SOURCE="${{ github.event.inputs.sts2_dll_source_url }}"

            if [[ " ${MISSING_DLLS[*]} " == *" sts2.dll "* ]]; then
              if [[ -z "${STS2_SOURCE}" ]]; then
                echo "No sts2.dll source provided; attempting to discover latest release asset or APK."
                TMP_RELEASE_JSON="$TMP_DIR/releases.json"
                AUTH_HEADER=()
                if [[ -n "${GITHUB_TOKEN:-}" ]]; then
                  AUTH_HEADER=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
                fi
              if ! curl -fsSL "${AUTH_HEADER[@]}" -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=20" \
                > "$TMP_RELEASE_JSON"; then
                echo "::error::Unable to fetch sts2.dll release metadata."
                exit 1
              fi
              if ! command -v jq >/dev/null 2>&1; then
                  echo "::error::jq is unavailable in runner; provide sts2_dll_source_url explicitly."
                  exit 1
                fi
                STS2_SOURCE="$(jq -r '.[].assets[] | select(.name=="sts2.dll" or (.name | endswith(".apk"))) | .browser_download_url' "$TMP_RELEASE_JSON" | head -n 1)"
              fi

              if [[ -n "${STS2_SOURCE}" ]]; then
                if [[ "${STS2_SOURCE}" == http* ]]; then
                  if [[ "${STS2_SOURCE}" == *.apk ]]; then
                    echo "Fetching prior APK and extracting sts2.dll from assets/dotnet_bcl."
                    PRIOR_APK="$TMP_DIR/prior-release.apk"
                    if command -v curl >/dev/null 2>&1; then
                      curl -fsSL -o "$PRIOR_APK" "$STS2_SOURCE"
                    elif command -v wget >/dev/null 2>&1; then
                      wget -qO "$PRIOR_APK" "$STS2_SOURCE"
                    else
                      echo "::error::Neither curl nor wget available to fetch prior APK."
                      exit 1
                    fi
                    if ! unzip -p "$PRIOR_APK" 'assets/dotnet_bcl/sts2.dll' > "$PUBLISH_DIR/sts2.dll"; then
                      echo "::error::Resolved prior APK does not contain assets/dotnet_bcl/sts2.dll."
                      exit 1
                    fi
                  else
                    echo "Fetching sts2.dll from resolved source."
                    if command -v curl >/dev/null 2>&1; then
                      curl -fsSL -o "$PUBLISH_DIR/sts2.dll" "$STS2_SOURCE"
                    elif command -v wget >/dev/null 2>&1; then
                      wget -qO "$PUBLISH_DIR/sts2.dll" "$STS2_SOURCE"
                    else
                      echo "::error::Neither curl nor wget available to fetch sts2.dll."
                      exit 1
                    fi
                  fi
                else
                  if [[ -f "$STS2_SOURCE" ]]; then
                    cp "$STS2_SOURCE" "$PUBLISH_DIR/sts2.dll"
                else
                  echo "::error::Provided sts2_dll_source_url must be a URL or readable local path."
                  exit 1
                fi
              fi
            else
              echo "::error::Unable to resolve sts2.dll source."
              exit 1
            fi

            for i in "${!MISSING_DLLS[@]}"; do
              if [[ "${MISSING_DLLS[i]}" == "sts2.dll" ]]; then
                unset "MISSING_DLLS[i]"
              fi
            done
            MISSING_DLLS=("${MISSING_DLLS[@]}")
          fi

          if (( ${#MISSING_DLLS[@]} > 0 )); then
            for dll in "${MISSING_DLLS[@]}"; do
              source="assets/dotnet_bcl/$dll"
              if ! unzip -l "$TMP_APK" "$source" > /dev/null; then
                echo "::error::Expected ${source} not present in upstream APK."
                exit 1
              fi
              unzip -p "$TMP_APK" "$source" > "$PUBLISH_DIR/$dll"
            done
          fi

          echo "Recovered missing publish dependencies from upstream release: ${MISSING_DLLS[*]}"

      - name: Generate launcher bootstrap PCK
        shell: bash
        run: |
          set -euo pipefail

          python3 scripts/make-bootstrap-pck.py
          if [[ ! -f android/assets/bootstrap.pck ]]; then
            echo "::error::bootstrap.pck generation failed."
            exit 1
          fi

      - name: Build patcher and stage Android assets
        shell: bash
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -euo pipefail

          ROOT_DIR="$(pwd)"
          PATCHER_DIR="$ROOT_DIR/src/STS2Mobile"
          BUILD_DIR="$ROOT_DIR/android"
          PUBLISH_DIR="$PATCHER_DIR/bin/Release/net9.0/publish"
          BCL_DIR="$BUILD_DIR/assets/dotnet_bcl"
          UPSTREAM_DIR="$ROOT_DIR/upstream/godot-export/.godot/mono/publish/arm64"

          cd "$PATCHER_DIR"
          dotnet publish -c Release

          mkdir -p "$BCL_DIR"
          copy_dependency() {
            local src_name="$1"
            if [[ -f "$PUBLISH_DIR/$src_name" ]]; then
              cp "$PUBLISH_DIR/$src_name" "$BCL_DIR/$src_name"
            elif [[ -f "$UPSTREAM_DIR/$src_name" ]]; then
              cp "$UPSTREAM_DIR/$src_name" "$BCL_DIR/$src_name"
            else
              echo "::error::Required dependency not found: $src_name"
              exit 1
            fi
          }

          cp "$PUBLISH_DIR"/STS2Mobile.dll "$PUBLISH_DIR"/SteamKit2.dll \
             "$PUBLISH_DIR"/protobuf-net.dll "$PUBLISH_DIR"/protobuf-net.Core.dll \
             "$PUBLISH_DIR"/System.IO.Hashing.dll "$PUBLISH_DIR"/ZstdSharp.dll \
             "$BCL_DIR/"
          copy_dependency 0Harmony.dll
          copy_dependency sts2.dll
          copy_dependency GodotSharp.dll

          if [[ ! -f "$BCL_DIR/Sentry.dll" ]]; then
            echo "Staging Sentry.dll required by sts2.dll metadata."
            SENTRY_VERSION="5.0.0"
            SENTRY_PACKAGE="$RUNNER_TEMP/sentry.${SENTRY_VERSION}.nupkg"
            SENTRY_URL="https://api.nuget.org/v3-flatcontainer/sentry/${SENTRY_VERSION}/sentry.${SENTRY_VERSION}.nupkg"
            curl -fsSL -o "$SENTRY_PACKAGE" "$SENTRY_URL"
            if ! unzip -p "$SENTRY_PACKAGE" 'lib/netstandard2.0/Sentry.dll' > "$BCL_DIR/Sentry.dll"; then
              echo "::error::Downloaded Sentry ${SENTRY_VERSION}, but lib/netstandard2.0/Sentry.dll was not found."
              exit 1
            fi
          fi

          echo "Patching SteamKit2 Android crypto calls."
          dotnet build "$ROOT_DIR/tools/SteamKitAndroidPatch/SteamKitAndroidPatch.csproj" -c Release
          dotnet "$ROOT_DIR/tools/SteamKitAndroidPatch/bin/Release/net9.0/SteamKitAndroidPatch.dll" \
            "$BCL_DIR/SteamKit2.dll" \
            "$BCL_DIR/STS2Mobile.dll" \
            "$BCL_DIR/sts2.dll"

          resolve_tls_so() {
            local runtime_version
            runtime_version="$(dotnet --list-runtimes | awk '/^Microsoft.NETCore.App / {print $2; exit}')"
            if [[ -z "${runtime_version}" ]]; then
              echo "::warning::Unable to detect Microsoft.NETCore.App runtime version."
              return 1
            fi

            local packaged_dir="$HOME/.nuget/packages/microsoft.netcore.app.runtime.mono.android-arm64/${runtime_version}"
            local local_so="$(find "$packaged_dir" -path '*/runtimes/android-arm64/native/libSystem.Security.Cryptography.Native.Android.so' 2>/dev/null | head -n 1 || true)"
            if [[ -n "${local_so}" ]]; then
              cp "${local_so}" "$BUILD_DIR/libs/release/arm64-v8a/"
              return 0
            fi

            local pkg_name="microsoft.netcore.app.runtime.mono.android-arm64"
            local pkg_file="$RUNNER_TEMP/${pkg_name}.${runtime_version}.nupkg"
            local pkg_url="https://api.nuget.org/v3-flatcontainer/${pkg_name}/${runtime_version}/${pkg_name}.${runtime_version}.nupkg"
            if ! curl -fsSL -o "$pkg_file" "$pkg_url"; then
              echo "::warning::Failed to download ${pkg_name} ${runtime_version} from NuGet."
              return 1
            fi

            local extract_dir="$RUNNER_TEMP/${pkg_name}_extract"
            mkdir -p "$extract_dir"
            if ! unzip -q "$pkg_file" -d "$extract_dir"; then
              echo "::warning::Failed to extract ${pkg_name} ${runtime_version} archive."
              return 1
            fi

            local downloaded_so="$(find "$extract_dir" -path '*/runtimes/android-arm64/native/libSystem.Security.Cryptography.Native.Android.so' 2>/dev/null | head -n 1 || true)"
            if [[ -z "${downloaded_so}" ]]; then
              echo "::warning::Downloaded ${pkg_name} ${runtime_version} but native TLS .so is missing."
              return 1
            fi

            cp "${downloaded_so}" "$BUILD_DIR/libs/release/arm64-v8a/"
          }

          mkdir -p "$BUILD_DIR/libs/release/arm64-v8a"
          if ! resolve_tls_so; then
            echo "::warning::TLS library libSystem.Security.Cryptography.Native.Android.so could not be resolved; proceeding without explicit native TLS copy."
          fi

      - name: Configure optional release signing
        id: signing
        shell: bash
        run: |
          set -euo pipefail
          DEFAULT_KEY_ALIAS="androiddebugkey"
          DEFAULT_KEY_PASSWORD="android"
          DEFAULT_KEY_STORE_PASSWORD="android"
          if [[ -n "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" && -n "${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}" && -n "${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}" ]]; then
            mkdir -p "$RUNNER_TEMP/android-signing"
            echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/android-signing/sts2.keystore"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "path=$RUNNER_TEMP/android-signing/sts2.keystore" >> "$GITHUB_OUTPUT"
            echo "password=${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}" >> "$GITHUB_OUTPUT"
            echo "alias=${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}" >> "$GITHUB_OUTPUT"
          else
            mkdir -p "$RUNNER_TEMP/android-signing"
            keytool -genkeypair \
              -alias "$DEFAULT_KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore "$RUNNER_TEMP/android-signing/sts2.keystore" \
              -storepass "$DEFAULT_KEY_STORE_PASSWORD" \
              -keypass "$DEFAULT_KEY_PASSWORD" \
              -dname "CN=Android Debug, O=StS2 Launcher CI, C=US" \
              -storetype PKCS12 \
              -noprompt
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "path=$RUNNER_TEMP/android-signing/sts2.keystore" >> "$GITHUB_OUTPUT"
            echo "password=$DEFAULT_KEY_STORE_PASSWORD" >> "$GITHUB_OUTPUT"
            echo "alias=$DEFAULT_KEY_ALIAS" >> "$GITHUB_OUTPUT"
            echo "::notice::Signing secrets are not configured. Building with a CI-generated debug key so the APK remains installable."
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build release APK
        id: build
        shell: bash
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          EXPORT_PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          KEYSTORE_PATH: ${{ steps.signing.outputs.path }}
          KEYSTORE_PASSWORD: ${{ steps.signing.outputs.password }}
          KEYSTORE_ALIAS: ${{ steps.signing.outputs.alias }}
        run: |
          set -euo pipefail

          cd android
          GRADLE_ARGS=(
            "assembleMonoRelease"
            "-Pexport_version_name=${VERSION_NAME}"
            "-Pexport_version_code=${VERSION_CODE}"
            "-Pexport_build_type=release"
            "-Pexport_edition=mono"
            "-Pexport_package_name=${EXPORT_PACKAGE_NAME}"
            "-Pexport_enabled_abis=arm64-v8a"
          )

          if [[ "${SIGNING_ENABLED}" == "true" ]]; then
            GRADLE_ARGS+=(
              "-Pperform_signing=true"
              "-Prelease_keystore_file=${KEYSTORE_PATH}"
              "-Prelease_keystore_password=${KEYSTORE_PASSWORD}"
              "-Prelease_keystore_alias=${KEYSTORE_ALIAS}"
            )
          else
            GRADLE_ARGS+=("-Pperform_signing=false")
          fi

          gradle "${GRADLE_ARGS[@]}"

          RAW_APK_PATH="$(find build/outputs/apk/mono/release -type f -name "StS2Launcher-v${VERSION_NAME}*.apk" | head -n 1)"
          if [[ -z "${RAW_APK_PATH}" ]] || [[ ! -f "${RAW_APK_PATH}" ]]; then
            echo "Files in build/outputs/apk/mono/release:"
            find build/outputs/apk/mono/release -type f
            echo "::error::Expected APK not found at ${RAW_APK_PATH}"
            exit 1
          fi
          ABS_APK_PATH="$(pwd)/${RAW_APK_PATH}"
          RENAMED_APK_PATH="$(dirname "${RAW_APK_PATH}")/StS2Launcher-v${VERSION_NAME}-arm64-v8a.apk"
          mv "$RAW_APK_PATH" "$RENAMED_APK_PATH"
          APK_PATH="android/${RENAMED_APK_PATH}"
          ABS_APK_PATH="$(pwd)/${RENAMED_APK_PATH}"

          pwsh ../scripts/verify-android-apk.ps1 -ApkPath "$ABS_APK_PATH" -Abi arm64-v8a

          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          sha256sum "$ABS_APK_PATH" > "${ABS_APK_PATH}.sha256"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ steps.version.outputs.release_tag }}
          path: |
            ${{ steps.build.outputs.path }}
            ${{ steps.build.outputs.path }}.sha256
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub release
    needs: build-android-release
    runs-on: ubuntu-latest
    if: needs.build-android-release.outputs.create_release == 'true'
    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-${{ needs.build-android-release.outputs.release_tag }}
          path: release-artifacts

      - name: Create GitHub release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-android-release.outputs.release_tag }}
          name: "StS2 Launcher ${{ needs.build-android-release.outputs.version_name }}"
          files: |
            release-artifacts/**/*.apk
            release-artifacts/**/*.sha256
          generate_release_notes: true
