name: Verify Android Release Assets

on:
  release:
    types:
      - published
      - edited
      - created
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to verify."
        required: true
        default: "v0.2.175-refactor-apk"
      asset_name:
        description: "Optional exact APK asset name. If empty, the workflow prefers ARM64, then universal, then first APK."
        required: false
        default: "StS2Launcher-v0.2.175-refactor-apk-arm64-v8a.apk"
      abi:
        description: "Expected APK ABI set."
        type: choice
        required: true
        default: "auto"
        options:
          - auto
          - universal
          - arm64-v8a
          - x86_64

permissions:
  contents: read

jobs:
  verify-assets:
    name: Verify Android release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout verifier scripts
        uses: actions/checkout@v4

      - name: Check APK and checksum assets
        id: assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag }}
          ASSET_NAME_INPUT: ${{ github.event.inputs.asset_name }}
        with:
          script: |
            const tag = context.payload?.release?.tag_name || context.payload?.inputs?.release_tag || process.env.RELEASE_TAG_INPUT;
            const requestedAsset = context.payload?.inputs?.asset_name || process.env.ASSET_NAME_INPUT || "";
            if (!tag) {
              core.setFailed("Release tag is missing from event payload and workflow input.");
              return;
            }

            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag,
            });

            const assets = release.data.assets || [];
            const apkAssets = assets.filter((asset) => asset.name && /^StS2Launcher-v.*\.apk$/i.test(asset.name));
            const shaAssets = assets.filter((asset) => asset.name && asset.name.endsWith(".sha256"));

            console.log(`Release: ${release.data.html_url}`);
            console.log(`APK assets found: ${apkAssets.length}`);
            console.log(`SHA-256 assets found: ${shaAssets.length}`);

            apkAssets.forEach((asset) => {
              console.log(`- ${asset.name} (${asset.size} bytes)`);
            });

            if (apkAssets.length < 1) {
              core.setFailed("No StS2Launcher-v*.apk asset found for this release.");
              return;
            }

            if (apkAssets.length > 1) {
              core.warning("Multiple APK assets found. This may be expected for multiple ABIs/build flavors.");
            }

            if (shaAssets.length < 1) {
              core.warning("No SHA-256 checksum file found. Add checksum assets for stronger release validation.");
            }

            const exactMatch = requestedAsset ? apkAssets.find((asset) => asset.name === requestedAsset) : null;
            if (requestedAsset && !exactMatch) {
              core.setFailed(`Requested APK asset was not found: ${requestedAsset}`);
              return;
            }

            const preferred = exactMatch
              || apkAssets.find((asset) => /arm64-v8a\.apk$/i.test(asset.name))
              || apkAssets.find((asset) => /universal-phone\.apk$/i.test(asset.name))
              || apkAssets.find((asset) => /universal.*\.apk$/i.test(asset.name))
              || apkAssets[0];
            const inferredAbi = /universal/i.test(preferred.name)
              ? "universal"
              : /x86_64/i.test(preferred.name)
                ? "x86_64"
                : "arm64-v8a";
            core.setOutput("release_tag", tag);
            core.setOutput("apk_asset_name", preferred.name);
            core.setOutput("inferred_abi", inferredAbi);
            console.log(`Selected APK for structural verification: ${preferred.name}`);
            console.log(`Inferred expected ABI: ${inferredAbi}`);

      - name: Verify uploaded APK structure and native Godot patch
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\scripts\verify-android-release-apk.ps1 `
            -Repo "${{ github.repository }}" `
            -ReleaseTag "${{ steps.assets.outputs.release_tag }}" `
            -AssetName "${{ steps.assets.outputs.apk_asset_name }}" `
            -Abi "${{ github.event.inputs.abi == 'auto' && steps.assets.outputs.inferred_abi || github.event.inputs.abi || steps.assets.outputs.inferred_abi }}"
