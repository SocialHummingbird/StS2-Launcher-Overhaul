<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="STS2 Launcher logo">
  <defs>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f4fe8"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#f6c453"/>
    </linearGradient>
    <radialGradient id="core" cx="48%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#1f2330"/>
      <stop offset="100%" stop-color="#0b0d13"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="none"/>
  <g filter="url(#soft)">
    <circle cx="512" cy="512" r="380" fill="url(#rim)"/>
    <circle cx="512" cy="512" r="330" fill="#11131a"/>
  </g>
  <circle cx="512" cy="512" r="320" fill="url(#core)"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M332 285h256c96 0 175 78.5 175 175 0 95.5-79 173-175 173H360" stroke="#ffe7b8" stroke-width="44"/>
    <path d="M360 463c66 0 140 46 140 140 0 95.5-80 173-175 173" stroke="#ffe7b8" stroke-width="44"/>
    <path d="M332 738h286" stroke="#ff6b35" stroke-width="48"/>
    <path d="M332 285l360 452" stroke="#e95f2f" stroke-width="34" opacity="0.45"/>
  </g>

  <g>
    <text x="512" y="870" text-anchor="middle" font-family="Verdana, Arial, Helvetica, sans-serif" font-size="74" fill="#f6f7ff" letter-spacing="2">OVERHAUL</text>
    <text x="512" y="930" text-anchor="middle" font-family="Verdana, Arial, Helvetica, sans-serif" font-size="44" fill="#ffdfb7" letter-spacing="6">LAUNCHER</text>
  </g>
</svg>